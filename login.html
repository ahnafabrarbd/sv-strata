<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV STRATA — sign in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
    <main class="login-main">
        <div class="login-card">
            <div class="login-logo">SV STRATA</div>

            <div class="login-tabs" role="tablist">
                <button class="login-tab active" data-tab="signin" type="button">Sign in</button>
                <button class="login-tab" data-tab="signup" type="button">Create account</button>
            </div>

            <form id="signin-form" class="login-form">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required>
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password" required>
                <button type="submit" class="login-submit">Sign in →</button>
                <div class="login-error" id="signin-error" aria-live="polite"></div>
            </form>

            <form id="signup-form" class="login-form hidden">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required minlength="2">
                <label>Password</label>
                <input type="password" name="password" autocomplete="new-password" required minlength="4">
                <button type="submit" class="login-submit">Create account →</button>
                <div class="login-error" id="signup-error" aria-live="polite"></div>
            </form>

            <div class="login-foot">local-only · no email · stored on this device</div>
        </div>
    </main>

    <script src="migrate.js"></script>
    <script src="auth.js"></script>
    <script>
        (function () {
            // Already signed in? Bounce straight to the destination.
            const params = new URLSearchParams(window.location.search);
            const nextRaw = params.get('next');
            const next = nextRaw ? decodeURIComponent(nextRaw) : 'index.html';
            if (window.SVAuth.currentUser()) {
                window.location.replace(next);
                return;
            }

            // Tab toggle.
            const tabs = document.querySelectorAll('.login-tab');
            const signinForm = document.getElementById('signin-form');
            const signupForm = document.getElementById('signup-form');
            tabs.forEach(t => t.addEventListener('click', () => {
                tabs.forEach(x => x.classList.toggle('active', x === t));
                signinForm.classList.toggle('hidden', t.dataset.tab !== 'signin');
                signupForm.classList.toggle('hidden', t.dataset.tab !== 'signup');
                document.getElementById('signin-error').textContent = '';
                document.getElementById('signup-error').textContent = '';
            }));

            function bind(form, errId, fn) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const errEl = document.getElementById(errId);
                    errEl.textContent = '';
                    const fd = new FormData(form);
                    const submitBtn = form.querySelector('.login-submit');
                    submitBtn.disabled = true;
                    try {
                        await fn(fd.get('username'), fd.get('password'));
                        window.location.replace(next);
                    } catch (err) {
                        errEl.textContent = err.message || String(err);
                        submitBtn.disabled = false;
                    }
                });
            }
            bind(signinForm, 'signin-error', window.SVAuth.signIn);
            bind(signupForm, 'signup-error', window.SVAuth.signUp);
        })();
    </script>
</body>
</html>
