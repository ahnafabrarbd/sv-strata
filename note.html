<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV STRATA — note</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="note.css">
</head>
<body class="note-body">
    <header>
        <a href="index.html" class="logo back-link">← SV STRATA</a>
        <span class="breadcrumb" id="breadcrumb"></span>
        <div class="actions">
            <a class="np-back" id="back-to-layer" href="#">← back to map</a>
        </div>
    </header>

    <main class="wiki">
        <article class="wiki-article" id="wiki-root">
            <h1 class="wiki-title" id="title-input" contenteditable="plaintext-only" spellcheck="false"></h1>
            <div class="wiki-byline" id="byline"></div>

            <section class="wiki-section">
                <h2>Genealogy</h2>
                <div class="wiki-body" data-field="genealogy" contenteditable="true" spellcheck="false"></div>
            </section>

            <section class="wiki-section">
                <h2>History · Biography</h2>
                <div class="wiki-body" data-field="history" contenteditable="true" spellcheck="false"></div>
            </section>

            <section class="wiki-section">
                <h2>Detail</h2>
                <div class="wiki-body" data-field="detail" contenteditable="true" spellcheck="false"></div>
            </section>

            <section class="wiki-section">
                <h2>Special details</h2>
                <div class="wiki-body" data-field="special" contenteditable="true" spellcheck="false"></div>
            </section>

            <section class="wiki-section">
                <h2>Pictures</h2>
                <div class="wiki-images" id="images-grid"></div>
                <label class="wiki-add-image">
                    + Add image
                    <input type="file" id="image-input" accept="image/*" multiple hidden>
                </label>
                <div class="wiki-image-hint">First image is shown as the node's face on the map.</div>
            </section>

            <section class="wiki-section">
                <h2>Bibliography</h2>
                <div class="wiki-bib" id="bib-list"></div>
                <button class="wiki-add-bib" id="add-bib" type="button">+ Add reference</button>
            </section>

            <section class="wiki-section">
                <h2>Comments</h2>
                <div class="wiki-comments" id="comments"></div>
                <form class="wiki-comment-form" id="comment-form">
                    <textarea id="comment-text" placeholder="Add a comment…" rows="3" required></textarea>
                    <button type="submit" class="wiki-comment-submit">Post comment</button>
                </form>
            </section>
        </article>
    </main>

    <script src="migrate.js"></script>
    <script src="auth.js"></script>
    <script src="shape.js"></script>
    <script>
    (function () {
        'use strict';

        const params = new URLSearchParams(window.location.search);
        const layerId = (params.get('layer') || 'faces');
        const aliases = { ideas: 'ideology', conditions: 'factory' };
        const id = aliases[layerId] || layerId;
        const nodeId = params.get('id');

        const meta = (window.SV_LAYERS || []).find(l => l.id === id) || window.SV_LAYERS[0];
        document.body.classList.add('layer-' + meta.id);
        document.title = 'SV STRATA — ' + meta.title + ' — note';
        document.getElementById('breadcrumb').textContent = meta.title;
        document.getElementById('back-to-layer').href = 'layer.html?layer=' + meta.id;

        const STORAGE_KEY = 'sv-strata.layer.' + meta.id;

        function loadLayer() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || { view: { x:0, y:0, scale:1 }, nodes: [], edges: [] };
            } catch (e) {
                return { view: { x:0, y:0, scale:1 }, nodes: [], edges: [] };
            }
        }
        function saveLayer(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        let data = loadLayer();
        let node = data.nodes.find(n => n.id === nodeId);

        if (!node) {
            // Bad URL — bounce back to layer.
            window.location.replace('layer.html?layer=' + meta.id);
            return;
        }

        // Backfill new fields onto legacy nodes.
        node.genealogy = node.genealogy || '';
        node.history   = node.history   || '';
        node.detail    = node.detail    || node.description || '';
        node.special   = node.special   || '';
        node.images    = node.images    || [];
        node.links     = node.links     || [];   // legacy link rows
        node.bib       = node.bib       || node.links.slice(); // bibliography == links + extras
        node.comments  = node.comments  || [];
        if (!node.createdBy) node.createdBy = (window.SVAuth.currentUser() || {}).username || 'unknown';
        if (!node.createdAt) node.createdAt = new Date().toISOString();

        // ----- title + byline -----
        const titleEl = document.getElementById('title-input');
        titleEl.textContent = node.title || 'Untitled';

        function renderByline() {
            const dt = new Date(node.createdAt);
            const stamp = isNaN(dt.getTime()) ? '' : dt.toISOString().slice(0, 10);
            document.getElementById('byline').innerHTML =
                'by <span class="byline-user">@' + escapeHtml(node.createdBy) + '</span>' +
                (stamp ? ' · created ' + stamp : '');
        }
        renderByline();

        function commit() {
            // Re-fetch the layer in case another tab wrote to it, replace
            // this node, save, and refresh the data reference.
            const fresh = loadLayer();
            const idx = fresh.nodes.findIndex(n => n.id === node.id);
            if (idx >= 0) fresh.nodes[idx] = node;
            saveLayer(fresh);
            data = fresh;
        }

        // ----- title editing -----
        let titleTimer;
        titleEl.addEventListener('input', () => {
            node.title = titleEl.textContent.trim();
            clearTimeout(titleTimer);
            titleTimer = setTimeout(commit, 250);
        });
        titleEl.addEventListener('blur', () => {
            clearTimeout(titleTimer);
            commit();
        });

        // ----- text sections (genealogy / history / detail / special) -----
        document.querySelectorAll('[data-field]').forEach(el => {
            const field = el.dataset.field;
            el.textContent = node[field] || '';
            let timer;
            el.addEventListener('input', () => {
                node[field] = el.textContent;
                clearTimeout(timer);
                timer = setTimeout(commit, 350);
            });
            el.addEventListener('blur', () => {
                clearTimeout(timer);
                commit();
            });
        });

        // ----- images -----
        const imagesGrid = document.getElementById('images-grid');
        function renderImages() {
            imagesGrid.innerHTML = '';
            node.images.forEach((img, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'wiki-image' + (idx === 0 ? ' primary' : '');

                const image = document.createElement('img');
                image.src = img.data;
                image.alt = img.name || '';
                wrap.appendChild(image);

                if (idx === 0) {
                    const tag = document.createElement('span');
                    tag.className = 'wiki-image-primary-tag';
                    tag.textContent = 'PRIMARY';
                    wrap.appendChild(tag);
                } else {
                    const promote = document.createElement('button');
                    promote.className = 'wiki-image-promote';
                    promote.type = 'button';
                    promote.textContent = 'Make primary';
                    promote.addEventListener('click', () => {
                        const moved = node.images.splice(idx, 1)[0];
                        node.images.unshift(moved);
                        commit();
                        renderImages();
                    });
                    wrap.appendChild(promote);
                }

                const rm = document.createElement('button');
                rm.className = 'wiki-image-remove';
                rm.type = 'button';
                rm.textContent = '×';
                rm.title = 'Remove image';
                rm.addEventListener('click', () => {
                    node.images.splice(idx, 1);
                    commit();
                    renderImages();
                });
                wrap.appendChild(rm);

                imagesGrid.appendChild(wrap);
            });
        }
        renderImages();

        document.getElementById('image-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            e.target.value = '';
            for (const file of files) {
                try {
                    const data = await processImage(file);
                    node.images.push({ name: file.name, data });
                } catch (err) {
                    alert('Failed to process image "' + file.name + '": ' + err.message);
                }
            }
            try {
                commit();
            } catch (err) {
                alert('Storage quota exceeded — remove some images or use smaller files.');
            }
            renderImages();
        });

        // ----- bibliography -----
        const bibList = document.getElementById('bib-list');
        function renderBib() {
            bibList.innerHTML = '';
            if (!node.bib.length) {
                const empty = document.createElement('div');
                empty.className = 'wiki-bib-empty';
                empty.textContent = 'No references yet.';
                bibList.appendChild(empty);
                return;
            }
            node.bib.forEach((ref, idx) => {
                const row = document.createElement('div');
                row.className = 'wiki-bib-row';

                const label = document.createElement('input');
                label.className = 'wiki-bib-label';
                label.placeholder = 'Label';
                label.value = ref.label || '';
                label.addEventListener('blur', () => { ref.label = label.value; commit(); });

                const url = document.createElement('input');
                url.className = 'wiki-bib-url';
                url.placeholder = 'https://…';
                url.value = ref.url || '';
                url.addEventListener('blur', () => { ref.url = url.value; commit(); });

                const open = document.createElement('a');
                open.className = 'wiki-bib-open';
                open.target = '_blank';
                open.rel = 'noopener noreferrer';
                open.textContent = '↗';
                open.title = 'Open in new tab';
                open.href = ref.url || '#';

                const rm = document.createElement('button');
                rm.className = 'wiki-bib-remove';
                rm.type = 'button';
                rm.textContent = '×';
                rm.title = 'Remove reference';
                rm.addEventListener('click', () => {
                    node.bib.splice(idx, 1);
                    commit();
                    renderBib();
                });

                row.appendChild(label);
                row.appendChild(url);
                row.appendChild(open);
                row.appendChild(rm);
                bibList.appendChild(row);
            });
        }
        renderBib();

        document.getElementById('add-bib').addEventListener('click', () => {
            node.bib.push({ label: '', url: '' });
            commit();
            renderBib();
        });

        // ----- comments -----
        const commentsEl = document.getElementById('comments');
        function renderComments() {
            commentsEl.innerHTML = '';
            if (!node.comments.length) {
                const empty = document.createElement('div');
                empty.className = 'wiki-comments-empty';
                empty.textContent = 'No comments yet — be the first.';
                commentsEl.appendChild(empty);
                return;
            }
            node.comments.slice().reverse().forEach(c => {
                const wrap = document.createElement('div');
                wrap.className = 'wiki-comment';

                const head = document.createElement('div');
                head.className = 'wiki-comment-head';
                const user = document.createElement('span');
                user.className = 'wiki-comment-user';
                user.textContent = '@' + (c.author || 'anon');
                const stamp = document.createElement('span');
                stamp.className = 'wiki-comment-stamp';
                const dt = new Date(c.createdAt);
                stamp.textContent = isNaN(dt.getTime()) ? '' : dt.toLocaleString();
                head.appendChild(user);
                head.appendChild(stamp);

                const body = document.createElement('div');
                body.className = 'wiki-comment-body';
                body.textContent = c.text;

                wrap.appendChild(head);
                wrap.appendChild(body);
                commentsEl.appendChild(wrap);
            });
        }
        renderComments();

        document.getElementById('comment-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const ta = document.getElementById('comment-text');
            const text = ta.value.trim();
            if (!text) return;
            const u = window.SVAuth.currentUser();
            node.comments.push({
                author: (u && u.username) || 'anon',
                text,
                createdAt: new Date().toISOString()
            });
            commit();
            ta.value = '';
            renderComments();
        });

        // Listen for cross-tab updates so comments / edits made elsewhere
        // surface here as a real-time feed.
        window.addEventListener('storage', (e) => {
            if (e.key !== STORAGE_KEY) return;
            const fresh = loadLayer();
            const updated = fresh.nodes.find(n => n.id === node.id);
            if (!updated) return;
            node = updated;
            data = fresh;
            // Re-render everything that could have changed.
            titleEl.textContent = node.title || 'Untitled';
            renderByline();
            document.querySelectorAll('[data-field]').forEach(el => {
                el.textContent = node[el.dataset.field] || '';
            });
            renderImages();
            renderBib();
            renderComments();
        });

        // ---------- helpers ----------
        function processImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const maxDim = 1000;
                        let w = img.width, h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                            else       { w = Math.round(w * maxDim / h); h = maxDim; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = reject;
                    img.src = reader.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
    })();
    </script>
</body>
</html>
