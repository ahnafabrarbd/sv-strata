<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV STRATA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span class="logo">SV STRATA</span>
        <div class="actions">
            <a id="link-lattice" href="lattice.html">Lattice ⌁</a>
            <button id="btn-export">Export</button>
            <label for="input-import">Import</label>
            <input type="file" id="input-import" accept="application/json" hidden>
        </div>
    </header>

    <main class="diagram">
        <svg viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid meet">
            <defs>
                <path id="sv-shape" d="" />
                <!--
                  Atmospheric glow: a wide low-opacity haze layered over a
                  tighter mid-glow, with the crisp source on top so the
                  contour stays sharp. Reads as light bleeding into the
                  background instead of a flat halo.
                -->
                <filter id="glow-1" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
                    <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b2"/>
                    <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b3"/>
                    <feComponentTransfer in="b3" result="b3dim">
                        <feFuncA type="linear" slope="0.45"/>
                    </feComponentTransfer>
                    <feComponentTransfer in="b2" result="b2dim">
                        <feFuncA type="linear" slope="0.7"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode in="b3dim"/>
                        <feMergeNode in="b2dim"/>
                        <feMergeNode in="b1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="glow-2" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
                    <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
                    <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b3"/>
                    <feComponentTransfer in="b3" result="b3dim">
                        <feFuncA type="linear" slope="0.5"/>
                    </feComponentTransfer>
                    <feComponentTransfer in="b2" result="b2dim">
                        <feFuncA type="linear" slope="0.75"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode in="b3dim"/>
                        <feMergeNode in="b2dim"/>
                        <feMergeNode in="b1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="glow-3" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
                    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b2"/>
                    <feGaussianBlur in="SourceGraphic" stdDeviation="36" result="b3"/>
                    <feComponentTransfer in="b3" result="b3dim">
                        <feFuncA type="linear" slope="0.55"/>
                    </feComponentTransfer>
                    <feComponentTransfer in="b2" result="b2dim">
                        <feFuncA type="linear" slope="0.8"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode in="b3dim"/>
                        <feMergeNode in="b2dim"/>
                        <feMergeNode in="b1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Layer 1: FACES -->
            <g class="layer layer-faces" data-enter="faces" transform="translate(420,15) scale(1.05)">
                <path class="layer-hit" d="" id="hit-faces"/>
                <use href="#sv-shape" class="sv-outline"/>
            </g>
            <line class="leader leader-faces" x1="270" y1="170" x2="470" y2="170"/>

            <!-- Layer 2: IDEOLOGY -->
            <g class="layer layer-ideology" data-enter="ideology" transform="translate(530,110) scale(1.05)">
                <path class="layer-hit" d="" id="hit-ideology"/>
                <use href="#sv-shape" class="sv-outline"/>
            </g>
            <line class="leader leader-ideology" x1="270" y1="395" x2="580" y2="370"/>

            <!-- Layer 3: FACTORY -->
            <g class="layer layer-factory" data-enter="factory" transform="translate(640,205) scale(1.05)">
                <path class="layer-hit" d="" id="hit-factory"/>
                <use href="#sv-shape" class="sv-outline"/>
            </g>
            <line class="leader leader-factory" x1="270" y1="620" x2="690" y2="565"/>

            <!-- Annotations as foreignObject so they share viewBox coords -->
            <foreignObject x="28" y="115" width="260" height="170" class="layer-faces">
                <div xmlns="http://www.w3.org/1999/xhtml" class="annotation">
                    <h2>FACES</h2>
                    <div class="subtitle">Surface stratum</div>
                    <div class="body" contenteditable="true" data-note="faces"></div>
                    <a class="enter" href="#" data-enter="faces">Enter →</a>
                </div>
            </foreignObject>

            <foreignObject x="28" y="340" width="260" height="170" class="layer-ideology">
                <div xmlns="http://www.w3.org/1999/xhtml" class="annotation">
                    <h2>IDEOLOGY</h2>
                    <div class="subtitle">Middle stratum</div>
                    <div class="body" contenteditable="true" data-note="ideology"></div>
                    <a class="enter" href="#" data-enter="ideology">Enter →</a>
                </div>
            </foreignObject>

            <foreignObject x="28" y="565" width="260" height="180" class="layer-factory">
                <div xmlns="http://www.w3.org/1999/xhtml" class="annotation">
                    <h2>FACTORY</h2>
                    <div class="subtitle">Mariana stratum</div>
                    <div class="body" contenteditable="true" data-note="factory"></div>
                    <a class="enter" href="#" data-enter="factory">Enter →</a>
                </div>
            </foreignObject>
        </svg>
        <div class="foot-note">silicon valley · three strata · click to descend</div>
    </main>

    <script src="migrate.js"></script>
    <script src="shape.js"></script>
    <script>
        (function () {
            'use strict';

            // Inject the SV path into <defs> and into each layer's hit-target.
            document.getElementById('sv-shape').setAttribute('d', SV_PATH);
            ['faces','ideology','factory'].forEach(function (id) {
                document.getElementById('hit-' + id).setAttribute('d', SV_PATH);
            });

            // Hydrate notes from localStorage and wire editing.
            SV_LAYERS.forEach(function (l) {
                var el = document.querySelector('[data-note="' + l.id + '"]');
                var saved = localStorage.getItem('sv-strata.notes.' + l.id);
                if (saved && saved.trim()) {
                    el.textContent = saved;
                    el.dataset.empty = 'false';
                } else {
                    el.textContent = l.placeholder;
                    el.dataset.empty = 'true';
                }
                el.addEventListener('focus', function () {
                    if (el.dataset.empty === 'true') {
                        el.textContent = '';
                        el.dataset.empty = 'false';
                    }
                });
                el.addEventListener('blur', function () {
                    var t = el.textContent.trim();
                    if (!t) {
                        el.textContent = l.placeholder;
                        el.dataset.empty = 'true';
                        localStorage.removeItem('sv-strata.notes.' + l.id);
                    } else {
                        localStorage.setItem('sv-strata.notes.' + l.id, t);
                    }
                });
            });

            // Layer click & "Enter →" link → navigate.
            function goto(layer) { window.location.href = 'layer.html?layer=' + layer; }
            document.querySelectorAll('[data-enter]').forEach(function (el) {
                el.addEventListener('click', function (e) {
                    // Don't navigate if the user is editing the note.
                    if (e.target.closest('[contenteditable="true"]')) return;
                    e.preventDefault();
                    goto(el.dataset.enter);
                });
            });

            // Export
            document.getElementById('btn-export').addEventListener('click', function () {
                var data = { exportedAt: new Date().toISOString(), notes: {}, layers: {} };
                SV_LAYERS.forEach(function (l) {
                    data.notes[l.id] = localStorage.getItem('sv-strata.notes.' + l.id) || '';
                    var layerJson = localStorage.getItem('sv-strata.layer.' + l.id);
                    data.layers[l.id] = layerJson ? JSON.parse(layerJson) : null;
                });
                var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'sv-strata-' + new Date().toISOString().slice(0, 10) + '.json';
                a.click();
                URL.revokeObjectURL(url);
            });

            // Import
            document.getElementById('input-import').addEventListener('change', function (e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function (ev) {
                    try {
                        var data = JSON.parse(ev.target.result);
                        if (data.notes) {
                            Object.keys(data.notes).forEach(function (k) {
                                var v = data.notes[k];
                                if (v) localStorage.setItem('sv-strata.notes.' + k, v);
                                else localStorage.removeItem('sv-strata.notes.' + k);
                            });
                        }
                        if (data.layers) {
                            Object.keys(data.layers).forEach(function (k) {
                                var v = data.layers[k];
                                if (v) localStorage.setItem('sv-strata.layer.' + k, JSON.stringify(v));
                                else localStorage.removeItem('sv-strata.layer.' + k);
                            });
                        }
                        alert('Import complete.');
                        window.location.reload();
                    } catch (err) {
                        alert('Import failed: ' + err.message);
                    }
                };
                reader.readAsText(file);
            });
        })();
    </script>
</body>
</html>
