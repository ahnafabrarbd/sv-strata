<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV STRATA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span class="logo">SV STRATA</span>
        <div class="actions">
            <a id="link-lattice" href="lattice.html">Lattice ⌁</a>
            <button id="btn-export">Export</button>
            <label for="input-import">Import</label>
            <input type="file" id="input-import" accept="application/json" hidden>
        </div>
    </header>

    <main class="diagram">
        <div class="holo-trio">
            <div class="holo-cell faces" data-enter="faces">
                <div class="holo-canvas-wrap" data-holo="mask" data-layer="faces"></div>
                <h2>FACES</h2>
                <div class="subtitle">Surface stratum</div>
                <div class="holo-note" contenteditable="true" data-note="faces"></div>
                <a class="enter" href="#" data-enter="faces">Enter →</a>
            </div>

            <div class="holo-cell ideology" data-enter="ideology">
                <div class="holo-canvas-wrap" data-holo="network" data-layer="ideology"></div>
                <h2>IDEOLOGY</h2>
                <div class="subtitle">Middle stratum</div>
                <div class="holo-note" contenteditable="true" data-note="ideology"></div>
                <a class="enter" href="#" data-enter="ideology">Enter →</a>
            </div>

            <div class="holo-cell factory" data-enter="factory">
                <div class="holo-canvas-wrap" data-holo="factory" data-layer="factory"></div>
                <h2>FACTORY</h2>
                <div class="subtitle">Mariana stratum</div>
                <div class="holo-note" contenteditable="true" data-note="factory"></div>
                <a class="enter" href="#" data-enter="factory">Enter →</a>
            </div>
        </div>
        <div class="foot-note">silicon valley · three strata · click a hologram to descend</div>
    </main>

    <script src="migrate.js"></script>
    <script src="auth.js"></script>
    <script src="shape.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <script type="module">
        import { mountHologram } from './holograms.js';

        // Mount one hologram per cell.
        document.querySelectorAll('[data-holo]').forEach(el => {
            mountHologram(el, el.dataset.holo, el.dataset.layer);
        });

        // Hydrate notes from localStorage and wire editing.
        window.SV_LAYERS.forEach(l => {
            const el = document.querySelector('[data-note="' + l.id + '"]');
            const saved = localStorage.getItem('sv-strata.notes.' + l.id);
            if (saved && saved.trim()) {
                el.textContent = saved;
                el.dataset.empty = 'false';
            } else {
                el.textContent = l.placeholder;
                el.dataset.empty = 'true';
            }
            el.addEventListener('focus', () => {
                if (el.dataset.empty === 'true') {
                    el.textContent = '';
                    el.dataset.empty = 'false';
                }
            });
            el.addEventListener('blur', () => {
                const t = el.textContent.trim();
                if (!t) {
                    el.textContent = l.placeholder;
                    el.dataset.empty = 'true';
                    localStorage.removeItem('sv-strata.notes.' + l.id);
                } else {
                    localStorage.setItem('sv-strata.notes.' + l.id, t);
                }
            });
        });

        // Cell click & "Enter →" link → navigate. Don't intercept clicks
        // landing inside the hologram canvas (those are orbit-drags) or in
        // the editable note.
        function goto(layer) { window.location.href = 'layer.html?layer=' + layer; }
        document.querySelectorAll('[data-enter]').forEach(el => {
            el.addEventListener('click', e => {
                if (e.target.closest('[contenteditable="true"]')) return;
                if (e.target.closest('.holo-canvas-wrap')) return;
                e.preventDefault();
                goto(el.dataset.enter);
            });
        });

        // Export — same shape as before.
        document.getElementById('btn-export').addEventListener('click', () => {
            const data = { exportedAt: new Date().toISOString(), notes: {}, layers: {} };
            window.SV_LAYERS.forEach(l => {
                data.notes[l.id] = localStorage.getItem('sv-strata.notes.' + l.id) || '';
                const layerJson = localStorage.getItem('sv-strata.layer.' + l.id);
                data.layers[l.id] = layerJson ? JSON.parse(layerJson) : null;
            });
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sv-strata-' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Import.
        document.getElementById('input-import').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.notes) {
                        Object.keys(data.notes).forEach(k => {
                            const v = data.notes[k];
                            if (v) localStorage.setItem('sv-strata.notes.' + k, v);
                            else localStorage.removeItem('sv-strata.notes.' + k);
                        });
                    }
                    if (data.layers) {
                        Object.keys(data.layers).forEach(k => {
                            const v = data.layers[k];
                            if (v) localStorage.setItem('sv-strata.layer.' + k, JSON.stringify(v));
                            else localStorage.removeItem('sv-strata.layer.' + k);
                        });
                    }
                    alert('Import complete.');
                    window.location.reload();
                } catch (err) {
                    alert('Import failed: ' + err.message);
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
