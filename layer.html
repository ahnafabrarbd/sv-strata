<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV STRATA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layer.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo back-link">← SV STRATA</a>
        <span class="breadcrumb" id="breadcrumb"></span>
        <div class="actions">
            <button id="btn-connect">Connect</button>
            <button id="btn-fit">Fit</button>
            <button id="btn-help" title="Show help">?</button>
        </div>
    </header>

    <div id="help-card" class="help-card hidden">
        <div><b>Click empty space</b> — add a node</div>
        <div><b>Drag</b> — pan / move node</div>
        <div><b>Scroll</b> — zoom</div>
        <div><b>Delete</b> — remove selected node</div>
        <div><b>Connect</b> — link two nodes (click each)</div>
        <div><b>Click an edge</b> — edit its label</div>
        <div><b>Shift-click edge</b> — delete it</div>
        <div><b>Fit</b> — recenter on the contour</div>
    </div>

    <div id="banner" class="map-banner-strata hidden"></div>

    <aside id="notes-panel" class="notes-panel hidden">
        <div class="np-header">
            <span class="np-title-label">Node</span>
            <button class="np-close" id="btn-np-close" title="Close">×</button>
        </div>
        <div class="np-body">
            <label class="np-label">Title</label>
            <input class="np-input" id="np-title" placeholder="Untitled" type="text">

            <label class="np-label">Description</label>
            <textarea class="np-textarea" id="np-description" placeholder="Notes, essay, ideology, quote, citation…"></textarea>

            <label class="np-label">Images</label>
            <div class="np-images" id="np-images"></div>
            <label class="np-add-image">
                + Add image
                <input type="file" id="np-image-input" accept="image/*" multiple hidden>
            </label>

            <label class="np-label">Links</label>
            <div class="np-links" id="np-links"></div>
            <button class="np-add-link" id="btn-add-link">+ Add link</button>

            <div class="np-footer">
                <button class="np-delete" id="btn-np-delete">Delete node</button>
            </div>
        </div>
    </aside>

    <main class="editor">
        <svg id="canvas">
            <defs>
                <path id="sv-shape-bg" d=""/>
            </defs>
            <g id="viewport">
                <g id="bg-shape" class="sv-bg-group">
                    <use href="#sv-shape-bg" class="sv-bg"/>
                </g>
                <g id="edges-layer"></g>
                <g id="nodes-layer"></g>
            </g>
        </svg>
    </main>

    <script src="shape.js"></script>
    <script src="editor.js"></script>
</body>
</html>
